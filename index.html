<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小学校6年間 総復習クイズ！</title>
<link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e2a;
    --bg2: #1a1840;
    --yellow: #ffd93d;
    --coral: #ff6b6b;
    --mint: #6bcb77;
    --sky: #4d96ff;
    --pink: #ff87c3;
    --purple: #a855f7;
    --card-radius: 18px;
    --white: #f0eeff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ★ Stars background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.8) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 30% 70%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,0.9) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 50%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 85% 25%, rgba(255,255,255,0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 85%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 90%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(2px 2px at 40% 40%, rgba(255,217,61,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 80%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 55%, rgba(255,255,255,0.6) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* === Screens === */
  .screen { display: none; position: relative; z-index: 1; }
  .screen.active { display: block; }

  /* === Title Screen === */
  #title-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    animation: fadeIn 0.6s ease;
  }
  .title-badge {
    background: linear-gradient(135deg, var(--yellow), #ffb300);
    color: #1a1400;
    font-size: 12px;
    font-weight: 900;
    padding: 6px 16px;
    border-radius: 100px;
    letter-spacing: 2px;
    margin-bottom: 20px;
    text-transform: uppercase;
    box-shadow: 0 4px 15px rgba(255,217,61,0.4);
  }
  .title-main {
    font-family: 'Kaisei Decol', serif;
    font-size: clamp(2rem, 8vw, 3.5rem);
    font-weight: 700;
    text-align: center;
    line-height: 1.3;
    background: linear-gradient(135deg, var(--yellow), var(--pink), var(--sky));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
    filter: drop-shadow(0 0 30px rgba(255,135,195,0.3));
  }
  .title-sub {
    font-size: 16px;
    color: rgba(240,238,255,0.7);
    margin-bottom: 40px;
    text-align: center;
  }
  .mascot {
    font-size: 80px;
    margin-bottom: 30px;
    animation: bounce 2s infinite;
    display: block;
    text-align: center;
    filter: drop-shadow(0 10px 30px rgba(255,107,107,0.3));
  }
  .subject-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    width: 100%;
    max-width: 480px;
    margin-bottom: 30px;
  }
  .subject-card {
    background: var(--bg2);
    border-radius: var(--card-radius);
    padding: 22px 18px;
    cursor: pointer;
    border: 3px solid transparent;
    transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .subject-card::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.3s;
    border-radius: 15px;
  }
  .subject-card:hover { transform: translateY(-6px) scale(1.03); }
  .subject-card:hover::before { opacity: 0.15; }
  .subject-card:active { transform: scale(0.97); }
  .subject-card.math { border-color: var(--sky); }
  .subject-card.math::before { background: var(--sky); }
  .subject-card.math:hover { box-shadow: 0 12px 40px rgba(77,150,255,0.35); }
  .subject-card.japanese { border-color: var(--coral); }
  .subject-card.japanese::before { background: var(--coral); }
  .subject-card.japanese:hover { box-shadow: 0 12px 40px rgba(255,107,107,0.35); }
  .subject-card.science { border-color: var(--mint); }
  .subject-card.science::before { background: var(--mint); }
  .subject-card.science:hover { box-shadow: 0 12px 40px rgba(107,203,119,0.35); }
  .subject-card.social { border-color: var(--yellow); }
  .subject-card.social::before { background: var(--yellow); }
  .subject-card.social:hover { box-shadow: 0 12px 40px rgba(255,217,61,0.35); }
  .subject-card.english { border-color: var(--pink); grid-column: 1 / -1; }
  .subject-card.english::before { background: var(--pink); }
  .subject-card.english:hover { box-shadow: 0 12px 40px rgba(255,135,195,0.35); }
  .subject-emoji { font-size: 40px; display: block; margin-bottom: 10px; }
  .subject-name {
    font-size: 18px;
    font-weight: 900;
    display: block;
    margin-bottom: 4px;
  }
  .subject-desc { font-size: 11px; color: rgba(240,238,255,0.55); }
  .subject-card.math .subject-name { color: var(--sky); }
  .subject-card.japanese .subject-name { color: var(--coral); }
  .subject-card.science .subject-name { color: var(--mint); }
  .subject-card.social .subject-name { color: var(--yellow); }
  .subject-card.english .subject-name { color: var(--pink); }

  /* Score display */
  .score-bar {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
    width: 100%;
    max-width: 480px;
  }
  .score-pill {
    background: rgba(255,255,255,0.08);
    border-radius: 100px;
    padding: 8px 20px;
    font-size: 13px;
    border: 1px solid rgba(255,255,255,0.1);
    flex: 1;
    text-align: center;
  }
  .score-pill span { font-weight: 900; font-size: 18px; color: var(--yellow); }

  /* === Grade Screen === */
  #grade-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    animation: slideUp 0.4s ease;
  }
  .screen-title {
    font-family: 'Kaisei Decol', serif;
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 8px;
    text-align: center;
  }
  .screen-hint { font-size: 13px; color: rgba(240,238,255,0.6); margin-bottom: 36px; text-align: center; }
  .grade-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    max-width: 380px;
    width: 100%;
    margin-bottom: 30px;
  }
  .grade-btn {
    background: var(--bg2);
    border: 3px solid var(--accent, var(--sky));
    border-radius: var(--card-radius);
    padding: 24px 10px;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    text-align: center;
    color: var(--white);
    font-family: 'Noto Sans JP', sans-serif;
  }
  .grade-btn:hover {
    transform: scale(1.08);
    background: var(--accent, var(--sky));
    color: #0f0e2a;
    box-shadow: 0 8px 30px rgba(77,150,255,0.4);
  }
  .grade-btn .grade-num {
    font-size: 32px;
    font-weight: 900;
    font-family: 'Kaisei Decol', serif;
    display: block;
  }
  .grade-btn .grade-label { font-size: 11px; opacity: 0.8; }
  .back-btn {
    background: transparent;
    border: 2px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.7);
    border-radius: 100px;
    padding: 10px 28px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    transition: all 0.2s;
  }
  .back-btn:hover { background: rgba(255,255,255,0.1); color: var(--white); }

  /* === Quiz Screen === */
  #quiz-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px 50px;
    animation: slideUp 0.4s ease;
  }
  .quiz-header {
    width: 100%;
    max-width: 520px;
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
  }
  .quiz-info {
    flex: 1;
  }
  .quiz-subject-tag {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
    opacity: 0.8;
  }
  .progress-wrap {
    background: rgba(255,255,255,0.1);
    border-radius: 100px;
    height: 8px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 100px;
    background: linear-gradient(90deg, var(--sky), var(--pink));
    transition: width 0.4s ease;
  }
  .question-counter {
    font-size: 20px;
    font-weight: 900;
    font-family: 'Kaisei Decol', serif;
    white-space: nowrap;
  }
  .question-counter span { font-size: 13px; font-weight: 400; opacity: 0.6; }

  .question-box {
    background: var(--bg2);
    border-radius: 24px;
    padding: 28px 24px;
    width: 100%;
    max-width: 520px;
    margin-bottom: 24px;
    border: 2px solid rgba(255,255,255,0.08);
    position: relative;
    min-height: 130px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .question-grade-badge {
    font-size: 10px;
    font-weight: 700;
    background: rgba(255,255,255,0.1);
    border-radius: 100px;
    padding: 3px 12px;
    margin-bottom: 14px;
    display: inline-block;
    letter-spacing: 1px;
  }
  .question-text {
    font-size: clamp(16px, 4vw, 20px);
    font-weight: 700;
    line-height: 1.6;
    color: var(--white);
  }

  .choices-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: 100%;
    max-width: 520px;
    margin-bottom: 24px;
  }
  .choice-btn {
    background: var(--bg2);
    border: 2px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 18px 14px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    color: var(--white);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    font-weight: 700;
    position: relative;
    overflow: hidden;
  }
  .choice-btn:hover:not(:disabled) {
    border-color: rgba(255,255,255,0.4);
    background: rgba(255,255,255,0.08);
    transform: translateY(-2px);
  }
  .choice-btn:disabled { cursor: default; }
  .choice-btn.correct {
    background: rgba(107,203,119,0.25);
    border-color: var(--mint);
    color: var(--mint);
    animation: correctPulse 0.5s ease;
  }
  .choice-btn.wrong {
    background: rgba(255,107,107,0.2);
    border-color: var(--coral);
    color: var(--coral);
    animation: shake 0.4s ease;
  }
  .choice-letter {
    position: absolute;
    top: 8px;
    left: 12px;
    font-size: 10px;
    opacity: 0.5;
    font-weight: 900;
  }

  .feedback-area {
    width: 100%;
    max-width: 520px;
    min-height: 70px;
    display: flex;
    align-items: center;
    gap: 16px;
    background: rgba(255,255,255,0.05);
    border-radius: 16px;
    padding: 16px 20px;
    opacity: 0;
    transition: opacity 0.3s;
    margin-bottom: 20px;
  }
  .feedback-area.show { opacity: 1; }
  .feedback-emoji { font-size: 32px; flex-shrink: 0; }
  .feedback-text { font-size: 14px; line-height: 1.5; }
  .feedback-text strong { display: block; font-size: 16px; margin-bottom: 4px; }

  .next-btn {
    background: linear-gradient(135deg, var(--sky), var(--purple));
    border: none;
    color: white;
    border-radius: 100px;
    padding: 16px 48px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 16px;
    font-weight: 900;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 6px 25px rgba(77,150,255,0.35);
    display: none;
  }
  .next-btn:hover { transform: scale(1.05); box-shadow: 0 10px 35px rgba(77,150,255,0.5); }
  .next-btn.show { display: block; }

  /* === Result Screen === */
  #result-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    animation: fadeIn 0.6s ease;
    text-align: center;
  }
  .result-rank {
    font-size: 90px;
    margin-bottom: 10px;
    animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  .result-grade {
    font-family: 'Kaisei Decol', serif;
    font-size: 40px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--yellow), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }
  .result-message { font-size: 16px; color: rgba(240,238,255,0.7); margin-bottom: 32px; }
  .result-score-box {
    background: var(--bg2);
    border-radius: 24px;
    padding: 24px 40px;
    margin-bottom: 32px;
    border: 2px solid rgba(255,255,255,0.1);
    min-width: 250px;
  }
  .result-score-num {
    font-size: 60px;
    font-weight: 900;
    font-family: 'Kaisei Decol', serif;
    color: var(--yellow);
    line-height: 1;
  }
  .result-score-num span { font-size: 24px; color: rgba(240,238,255,0.5); }
  .result-score-label { font-size: 13px; opacity: 0.6; margin-top: 6px; }
  .result-accuracy {
    font-size: 18px;
    font-weight: 700;
    margin-top: 12px;
  }

  .result-actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .btn-retry, .btn-home {
    border-radius: 100px;
    padding: 14px 32px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    border: none;
  }
  .btn-retry {
    background: linear-gradient(135deg, var(--coral), #ff4757);
    color: white;
    box-shadow: 0 6px 20px rgba(255,107,107,0.35);
  }
  .btn-retry:hover { transform: scale(1.06); }
  .btn-home {
    background: rgba(255,255,255,0.1);
    color: var(--white);
    border: 2px solid rgba(255,255,255,0.2);
  }
  .btn-home:hover { background: rgba(255,255,255,0.15); transform: scale(1.04); }

  /* Correct/wrong count */
  .result-breakdown {
    display: flex;
    gap: 16px;
    margin-top: 16px;
  }
  .breakdown-pill {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 12px;
    font-size: 13px;
  }
  .breakdown-pill .count { font-size: 26px; font-weight: 900; font-family: 'Kaisei Decol', serif; display: block; }
  .breakdown-pill.correct-pill .count { color: var(--mint); }
  .breakdown-pill.wrong-pill .count { color: var(--coral); }

  /* === Overlay feedback === */
  .big-feedback {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-size: 90px;
    pointer-events: none;
    z-index: 100;
    transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
    opacity: 0;
  }
  .big-feedback.show {
    transform: translate(-50%, -50%) scale(1);
    opacity: 1;
  }
  .big-feedback.hide {
    transform: translate(-50%, -50%) scale(2);
    opacity: 0;
  }

  /* === Animations === */
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }
  @keyframes correctPulse {
    0% { transform: scale(1); }
    30% { transform: scale(1.06); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
  }
  @keyframes popIn {
    0% { transform: scale(0) rotate(-20deg); }
    60% { transform: scale(1.2) rotate(5deg); }
    100% { transform: scale(1) rotate(0deg); }
  }

  /* Mobile */
  @media (max-width: 400px) {
    .subject-grid { grid-template-columns: 1fr 1fr; }
    .grade-grid { grid-template-columns: repeat(3, 1fr); }
    .choices-grid { grid-template-columns: 1fr; }
  }

  .total-score-badge {
    position: fixed;
    top: 16px;
    right: 16px;
    background: rgba(255,217,61,0.15);
    border: 2px solid var(--yellow);
    border-radius: 100px;
    padding: 6px 16px;
    font-size: 13px;
    font-weight: 900;
    color: var(--yellow);
    z-index: 50;
    display: none;
  }
  .total-score-badge.show { display: block; }

  /* Confetti particles */
  .confetti-wrap {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 200;
    overflow: hidden;
  }
  .confetto {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    animation: confettiFall 1.5s ease-in forwards;
    top: -10px;
  }
  @keyframes confettiFall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

<!-- Big feedback overlay -->
<div class="big-feedback" id="bigFeedback"></div>
<!-- Confetti -->
<div class="confetti-wrap" id="confettiWrap"></div>
<!-- Total score badge -->
<div class="total-score-badge" id="totalBadge">🏆 <span id="totalScoreDisplay">0</span>点</div>

<!-- ==================== TITLE SCREEN ==================== -->
<div class="screen active" id="title-screen">
  <span class="mascot">🎓</span>
  <div class="title-badge">ELEMENTARY SCHOOL QUIZ</div>
  <h1 class="title-main">小学校6年間<br>総復習クイズ！</h1>
  <p class="title-sub">好きな科目を選んでスタート！全 5 科目対応</p>

  <div class="score-bar">
    <div class="score-pill">合計スコア <span id="totalScore">0</span>点</div>
    <div class="score-pill">正答率 <span id="correctRate">-</span></div>
  </div>

  <div class="subject-grid">
    <div class="subject-card math" onclick="selectSubject('math')">
      <span class="subject-emoji">🔢</span>
      <span class="subject-name">算　数</span>
      <span class="subject-desc">計算・図形・割合など</span>
    </div>
    <div class="subject-card japanese" onclick="selectSubject('japanese')">
      <span class="subject-emoji">📖</span>
      <span class="subject-name">国　語</span>
      <span class="subject-desc">漢字・文法・文学など</span>
    </div>
    <div class="subject-card science" onclick="selectSubject('science')">
      <span class="subject-emoji">🔬</span>
      <span class="subject-name">理　科</span>
      <span class="subject-desc">植物・天体・化学など</span>
    </div>
    <div class="subject-card social" onclick="selectSubject('social')">
      <span class="subject-emoji">🗾</span>
      <span class="subject-name">社　会</span>
      <span class="subject-desc">地理・歴史・公民など</span>
    </div>
    <div class="subject-card english" onclick="selectSubject('english')">
      <span class="subject-emoji">🌍</span>
      <span class="subject-name">英　語</span>
      <span class="subject-desc">単語・フレーズ・会話など</span>
    </div>
  </div>
</div>

<!-- ==================== GRADE SCREEN ==================== -->
<div class="screen" id="grade-screen">
  <div style="font-size:60px;text-align:center;margin-bottom:20px" id="gradeEmoji">🔢</div>
  <h2 class="screen-title" id="gradeTitle">算数をえらびました！</h2>
  <p class="screen-hint">何年生の問題にちょうせんする？</p>
  <div class="grade-grid" id="gradeGrid">
    <button class="grade-btn" onclick="selectGrade(1)"><span class="grade-num">1</span><span class="grade-label">年生</span></button>
    <button class="grade-btn" onclick="selectGrade(2)"><span class="grade-num">2</span><span class="grade-label">年生</span></button>
    <button class="grade-btn" onclick="selectGrade(3)"><span class="grade-num">3</span><span class="grade-label">年生</span></button>
    <button class="grade-btn" onclick="selectGrade(4)"><span class="grade-num">4</span><span class="grade-label">年生</span></button>
    <button class="grade-btn" onclick="selectGrade(5)"><span class="grade-num">5</span><span class="grade-label">年生</span></button>
    <button class="grade-btn" onclick="selectGrade(6)"><span class="grade-num">6</span><span class="grade-label">年生</span></button>
  </div>

      { q: '地図で北はどの方向？', choices: ['下', '左', '上', '右'], answer: 2, hint: '地図では上が北、下が南、右が東、左が西だよ！' },
      { q: '郵便局の仕事は何？', choices: ['教育', '手紙・荷物を届ける', '火を消す', '病気を治す'], answer: 1, hint: '郵便局は手紙や荷物を届けるのが仕事だよ！' },

      { q: '「燃やせるごみ」はどこへ行く？', choices: ['川', '清掃工場', '学校', '公園'], answer: 1, hint: '燃やせるごみは清掃工場（せいそうこうじょう）で焼却処分されるよ！' },
      { q: '都道府県知事（ちじ）を選ぶのは誰？', choices: ['総理大臣', 'その地域の住民', '天皇', '国会議員'], answer: 1, hint: '知事（ちじ）はその都道府県に住む人が選挙で選ぶよ！' },
      { q: '昔から伝わる農業での米作りの道具は？', choices: ['トラクター', 'パソコン', 'くわ・鎌', 'スマホ'], answer: 2, hint: '昔はくわや鎌（かま）を使って農作業をしていたよ！今は機械化が進んでいる！' },
      { q: '自然災害への備えで「ハザードマップ」とは？', choices: ['天気予報図', '危険な場所の地図', '農地の地図', '道路地図'], answer: 1, hint: 'ハザードマップは洪水や地震などの危険な場所を示した地図だよ！' },
    ],
    5: [
      { q: '日本の国土で山地が占める割合は？', choices: ['約30%', '約50%', '約70%', '約90%'], answer: 2, hint: '日本は山がちな国で、国土の約70%が山地だよ！農地が少ない理由の一つ！' },
      { q: '米の有名な産地はどれ？', choices: ['沖縄県', '新潟県', '東京都', '大阪府'], answer: 1, hint: '新潟県は「コシヒカリ」で有名な米の大産地だよ！北海道・秋田も有名！' },
      { q: '日本で一番長い川は？', choices: ['利根川', '信濃川', '淀川', '天竜川'], answer: 1, hint: '日本で一番長い川は「信濃川（しなのがわ）」だよ！長さは367km！' },
      { q: '日本の輸出品として昔から有名なものは？', choices: ['石油', '鉄鉱石', '自動車・機械類', '木材'], answer: 2, hint: '日本は自動車や機械類の輸出が有名だよ！トヨタ・ホンダなどが世界で活躍！' },
      { q: '国会で法律を決めるのは誰？', choices: ['総理大臣', '天皇', '国会議員', '裁判所'], answer: 2, hint: '法律（ほうりつ）を作るのは「国会議員（こっかいぎいん）」！三権分立の立法権だね！' },
    ],
    6: [
      { q: '大化の改新（たいかのかいしん）は何年？', choices: ['593年', '645年', '710年', '794年'], answer: 1, hint: '大化の改新は645年！中大兄皇子（なかのおおえのおうじ）と中臣鎌足（なかとみのかまたり）が中心！' },
      { q: '日本国憲法が公布されたのは何年？', choices: ['1889年', '1945年', '1946年', '1952年'], answer: 2, hint: '日本国憲法は1946年11月3日に公布（こうふ）されたよ！施行は翌1947年5月3日！' },
      { q: '「聖徳太子（しょうとくたいし）」が建てたとされるお寺は？', choices: ['東大寺', '法隆寺', '金閣寺', '清水寺'], answer: 1, hint: '法隆寺（ほうりゅうじ）は聖徳太子が建てたとされる世界最古の木造建築物！' },
      { q: '江戸幕府を開いたのは誰？', choices: ['豊臣秀吉', '織田信長', '徳川家康', '源頼朝'], answer: 2, hint: '1603年に徳川家康（とくがわいえやす）が江戸幕府を開いたよ！江戸は今の東京！' },
      { q: '日本国憲法の三原則のひとつ「基本的人権の尊重」とは？', choices: ['国が全て決める', '人は生まれながらに権利を持つ', '法律だけが正しい', '強い者が得をする'], answer: 1, hint: 'すべての人は生まれながらに権利（人権）を持つという考え方だよ！大切な原則！' },
    ],
  },
  english: {
    5: [
      { q: '"apple" の意味は？', choices: ['みかん', 'りんご', 'ぶどう', 'バナナ'], answer: 1, hint: '"apple（アップル）" はりんごだよ！🍎' },
      { q: '"What time is it?" の意味は？', choices: ['何歳ですか？', '何時ですか？', 'どこですか？', '誰ですか？'], answer: 1, hint: '"What time（ホワット タイム）" で「何時」という意味だよ！' },
      { q: '"I have a dog." の意味は？', choices: ['私は犬が好きです', '私は犬を飼っています', '私は犬が嫌いです', '私は犬を見ました'], answer: 1, hint: '"have（ハブ）" は「持っている・飼っている」という意味だよ！' },
      { q: '"red, blue, green" はどんな言葉のグループ？', choices: ['食べ物', '色', '動物', '数字'], answer: 1, hint: '"red（赤）、blue（青）、green（緑）"は色の名前だよ！🎨' },
      { q: '"Monday（マンデー）"は何曜日？', choices: ['日曜日', '月曜日', '火曜日', '水曜日'], answer: 1, hint: '"Monday" は月曜日！"月（Moon）"と関係あるよ！' },
    ],
    6: [
      { q: '"I like playing soccer." の意味は？', choices: ['私はサッカーが得意です', '私はサッカーをするのが好きです', '私はサッカーを見るのが好きです', '私はサッカーが嫌いです'], answer: 1, hint: '"like ＋ 動詞ing" で「〜するのが好き」という意味だよ！' },
      { q: '"Where are you from?" の意味は？', choices: ['どこに行きますか？', 'どこにいますか？', 'どこ出身ですか？', 'どこに住んでいますか？'], answer: 2, hint: '"from（フロム）" は「〜から・〜出身」という意味だよ！' },
      { q: '"She can swim very well." の意味は？', choices: ['彼女は泳ぐのが好きです', '彼女はとても上手に泳げます', '彼女は泳いでいます', '彼女は泳げません'], answer: 1, hint: '"can（キャン）" は「〜できる」という意味！"very well" はとても上手に！' },
      { q: '"What do you want to be?" の意味は？', choices: ['何が食べたいですか？', '何をしましたか？', 'どこへ行きたいですか？', '将来何になりたいですか？'], answer: 3, hint: '"want to be（ウォント トゥ ビー）" は「〜になりたい」！将来の夢を聞く表現だよ！' },
      { q: '"Let\'s play together!" の意味は？', choices: ['ゆっくり遊んで！', '一緒に遊ぼう！', '遊ぶのをやめて！', '遊んだの？'], answer: 1, hint: '"Let\'s（レッツ）" は「〜しましょう」！"together（トゥゲザー）" は「一緒に」だよ！' },
    ],
  },
};

// Science/social only start from grade 3
const GRADE_LIMITS = {
  math: [1,2,3,4,5,6],
  japanese: [1,2,3,4,5,6],
  science: [3,4,5,6],
  social: [3,4,5,6],
  english: [5,6],
};

// ==================== STATE ====================
let currentSubject = null;
let currentGrade = null;
let currentQuestions = [];
let currentIndex = 0;
let currentScore = 0;
let sessionCorrect = 0;
let sessionWrong = 0;
let answered = false;
let totalScore = 0;
let totalCorrect = 0;
let totalWrong = 0;

// ==================== LOGIC ====================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function selectSubject(subj) {
  currentSubject = subj;
  const info = SUBJECTS[subj];
  document.getElementById('gradeEmoji').textContent = info.emoji;
  document.getElementById('gradeTitle').textContent = info.name + 'をえらびました！';

  // Update accent color
  const gradeGrid = document.getElementById('gradeGrid');
  const gradeBtns = gradeGrid.querySelectorAll('.grade-btn');
  gradeBtns.forEach(btn => {
    btn.style.borderColor = info.color;
    btn.style.color = 'var(--white)';
  });

  // Show only available grades
  const available = GRADE_LIMITS[subj];
  gradeBtns.forEach((btn, i) => {
    const grade = i + 1;
    if (available.includes(grade)) {
      btn.style.opacity = '1';
      btn.style.pointerEvents = 'auto';
    } else {
      btn.style.opacity = '0.2';
      btn.style.pointerEvents = 'none';
    }
  });

  showScreen('grade-screen');
}

function selectGrade(grade) {
  currentGrade = grade;
  const qs = QUESTIONS[currentSubject][grade];
  if (!qs || qs.length === 0) return;

  currentQuestions = shuffle([...qs]).slice(0, Math.min(5, qs.length));
  currentIndex = 0;
  currentScore = 0;
  sessionCorrect = 0;
  sessionWrong = 0;
  answered = false;

  setupQuizUI();
  loadQuestion();
  showScreen('quiz-screen');
}

function setupQuizUI() {
  const info = SUBJECTS[currentSubject];
  document.getElementById('quizSubjectTag').textContent = info.name + ' · ' + currentGrade + '年生';
  document.getElementById('quizSubjectTag').style.color = info.color;
  document.getElementById('totalBadge').classList.add('show');
}

function loadQuestion() {
  const q = currentQuestions[currentIndex];
  const total = currentQuestions.length;

  // Progress
  document.getElementById('progressFill').style.width = (currentIndex / total * 100) + '%';
  document.getElementById('qCounter').innerHTML = (currentIndex + 1) + ' <span>/ ' + total + '</span>';
  document.getElementById('qGradeBadge').textContent = '🌟 ' + currentGrade + '年生レベル';
  document.getElementById('questionText').textContent = q.q;

  // Choices
  const grid = document.getElementById('choicesGrid');
  grid.innerHTML = '';
  const letters = ['Ａ', 'Ｂ', 'Ｃ', 'Ｄ'];
  q.choices.forEach((choice, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = '<span class="choice-letter">' + letters[i] + '</span>' + choice;
    btn.onclick = () => checkAnswer(i, btn);
    grid.appendChild(btn);
  });

  // Reset feedback
  const fb = document.getElementById('feedbackArea');
  fb.classList.remove('show');
  document.getElementById('nextBtn').classList.remove('show');
  answered = false;
}

function checkAnswer(selectedIdx, btn) {
  if (answered) return;
  answered = true;

  const q = currentQuestions[currentIndex];
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(b => b.disabled = true);

  const correct = selectedIdx === q.answer;

  if (correct) {
    btn.classList.add('correct');
    sessionCorrect++;
    totalCorrect++;
    currentScore += 10;
    totalScore += 10;
    showBigFeedback('⭕');
    playCorrectFeedback(q);
  } else {
    btn.classList.add('wrong');
    btns[q.answer].classList.add('correct');
    sessionWrong++;
    totalWrong++;
    showBigFeedback('❌');
    playWrongFeedback(q);
  }

  // Update score
  document.getElementById('totalScoreDisplay').textContent = totalScore;
  updateMainScore();

  // Show next button
  setTimeout(() => {
    document.getElementById('nextBtn').classList.add('show');
  }, 800);
}

function showBigFeedback(emoji) {
  const el = document.getElementById('bigFeedback');
  el.textContent = emoji;
  el.className = 'big-feedback show';
  setTimeout(() => { el.classList.add('hide'); }, 600);
  setTimeout(() => { el.className = 'big-feedback'; }, 900);
}

function playCorrectFeedback(q) {
  const fb = document.getElementById('feedbackArea');
  fb.style.borderColor = 'rgba(107,203,119,0.3)';
  document.getElementById('feedbackEmoji').textContent = ['🎉', '✨', '🌟', '🎊', '🔥'][Math.floor(Math.random()*5)];
  document.getElementById('feedbackTitle').textContent = ['せいかい！すごい！', 'やったー！正解！', 'さすが！正解！', 'パーフェクト！', '天才かも！'][Math.floor(Math.random()*5)];
  document.getElementById('feedbackTitle').style.color = 'var(--mint)';
  document.getElementById('feedbackDetail').textContent = q.hint;
  fb.classList.add('show');
}

function playWrongFeedback(q) {
  const fb = document.getElementById('feedbackArea');
  fb.style.borderColor = 'rgba(255,107,107,0.3)';
  document.getElementById('feedbackEmoji').textContent = ['😅', '💪', '🤔', '📚', '😤'][Math.floor(Math.random()*5)];
  document.getElementById('feedbackTitle').textContent = ['ざんねん！おしい！', 'もうちょっとだった！', 'つぎはがんばろう！', 'おしい！惜しい！', 'まちがえたけど覚えよう！'][Math.floor(Math.random()*5)];
  document.getElementById('feedbackTitle').style.color = 'var(--coral)';
  document.getElementById('feedbackDetail').textContent = '正解のヒント：' + q.hint;
  fb.classList.add('show');
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= currentQuestions.length) {
    showResult();
  } else {
    loadQuestion();
  }
}

function showResult() {
  document.getElementById('progressFill').style.width = '100%';

  const total = currentQuestions.length;
  const rate = Math.round(sessionCorrect / total * 100);

  // Grade
  let rank, grade, msg;
  if (rate === 100) { rank = '🏆'; grade = '満点！完璧！'; msg = 'ぜんもん正解！！天才すぎる！！'; spawnConfetti(); }
  else if (rate >= 80) { rank = '🥇'; grade = 'めちゃすごい！'; msg = 'ほぼ満点！かなりできてるぞ！'; }
  else if (rate >= 60) { rank = '🥈'; grade = 'なかなかいいね！'; msg = 'まちがえたところをもう一度チェック！'; }
  else if (rate >= 40) { rank = '🥉'; grade = 'もう少しかな！'; msg = 'あきらめないで！くり返し練習しよう！'; }
  else { rank = '📚'; grade = 'よし、勉強しよう！'; msg = 'まずは教科書を読み直してみよう！きっとできるよ！'; }

  document.getElementById('resultRank').textContent = rank;
  document.getElementById('resultGrade').textContent = grade;
  document.getElementById('resultMessage').textContent = msg;
  document.getElementById('resultScore').innerHTML = currentScore + ' <span>点</span>';
  document.getElementById('correctCount').textContent = sessionCorrect;
  document.getElementById('wrongCount').textContent = sessionWrong;
  document.getElementById('resultAccuracy').textContent = '正答率 ' + rate + '%';

  showScreen('result-screen');
}

function retryQuiz() {
  selectGrade(currentGrade);
}

function updateMainScore() {
  const total = totalCorrect + totalWrong;
  document.getElementById('totalScore').textContent = totalScore;
  document.getElementById('correctRate').textContent = total > 0 ? Math.round(totalCorrect/total*100) + '%' : '-';
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function spawnConfetti() {
  const wrap = document.getElementById('confettiWrap');
  const colors = ['#ffd93d','#ff6b6b','#6bcb77','#4d96ff','#ff87c3','#a855f7'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetto';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.animationDelay = Math.random() * 0.5 + 's';
      el.style.animationDuration = (1 + Math.random()) + 's';
      el.style.transform = `rotate(${Math.random()*360}deg)`;
      wrap.appendChild(el);
      setTimeout(() => el.remove(), 2000);
    }, i * 20);
  }
}
</script>
